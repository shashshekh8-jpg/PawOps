name: Nightly Intelligence Sync
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update-ml-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Analytics Engine
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install pandas scikit-learn psycopg2-binary
          python analytics/adoption_prediction.py
